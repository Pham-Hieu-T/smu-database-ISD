<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inventory Storage</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <!-- Top bar with app name and backend status. -->
    <header class="site-header">
      <div class="header-row">
        <a class="brand" href="#dashboard">Inventory Storage</a>
        <div class="backend-status">
          <span>Backend</span>
          <span class="status-pill is-checking" id="health-pill">Checking</span>
        </div>
      </div>

      <!-- Main page buttons. Each button changes the hash route, like #products. -->
      <nav class="nav" aria-label="Primary">
        <button class="nav-link is-active" type="button" data-route="dashboard">Dashboard</button>
        <button class="nav-link" type="button" data-route="products">Products</button>
        <button class="nav-link" type="button" data-route="storage-sites">Storage Sites</button>
        <button class="nav-link" type="button" data-route="sources">Sources</button>
        <button class="nav-link" type="button" data-route="purchases">Purchases</button>
        <button class="nav-link" type="button" data-route="transactions">Transactions</button>
        <button class="nav-link" type="button" data-route="reports">Reports</button>
      </nav>
    </header>

    <!-- JavaScript puts each page into this main area. -->
    <main class="page">
      <div class="page-heading">
        <h1 id="page-title">Dashboard</h1>
        <button class="plain-button" id="refresh-view" type="button">Refresh</button>
      </div>
      <div id="app"></div>
    </main>

    <!-- Forms open here as simple pop-up modals. -->
    <div id="modal-root"></div>

    <!-- schema.js loads first because app.js needs the table definitions. -->
    <script defer src="schema.js?v=7"></script>
    <script defer src="app.js?v=7"></script>
  </body>
</html>
